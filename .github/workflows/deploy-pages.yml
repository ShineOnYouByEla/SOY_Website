name: Deploy to GitHub Pages

# Veröffentlicht die statische Seite automatisch bei jedem Push auf main.
# Einmalig nötig: Repo-Einstellungen -> Pages -> "Build and deployment" ->
# Source auf "GitHub Actions" stellen.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Gleichzeitige Deployments vermeiden
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Baut kataloge/manifest.json automatisch aus den vorhandenen PDFs,
      # damit neue Kataloge ohne Code-Änderung erscheinen.
      - name: Katalog-Liste aus PDFs erzeugen
        run: node scripts/build-katalog-manifest.mjs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # gesamtes Repo-Wurzelverzeichnis als Website hochladen
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
